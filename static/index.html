                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augLightSat" checked> Saturation</label><span style="font-size:0.72rem;color:#aaa">— adjust color intensity</span></div>
                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augLightJitter" checked> Color Jitter</label><span style="font-size:0.72rem;color:#aaa">— shift RGB channels</span></div>
                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augLightShadow"> Shadow</label><span style="font-size:0.72rem;color:#aaa">— add random dark regions</span></div>
                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augLightNoise"> Noise</label><span style="font-size:0.72rem;color:#aaa">— Gaussian noise (low-quality cam)</span></div>
                <div style="display:flex;align-items:baseline;gap:4px"><label><input type="checkbox" id="augLightBlur"> Blur</label><span style="font-size:0.72rem;color:#aaa">— Gaussian blur (out-of-focus)</span></div>
              </div>
              <div id="augLightParams"></div>
            </div>

            <div style="background:#f9f9f9;border:1px solid #e0e0e0;border-radius:6px;padding:10px;margin-bottom:8px">
              <label style="font-weight:600;font-size:0.85rem"><input type="checkbox" id="augRobotEnabled" checked> Robot Noise</label>
              <div style="font-size:0.75rem;color:#999;margin:2px 0 4px 18px">Add random noise to action/state for policy robustness</div>
              <div style="padding-left:18px;margin-top:4px;font-size:0.82rem;color:#666">
                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augRobotStart" checked> Random Start Trim</label><span style="font-size:0.72rem;color:#aaa">— trim frames from start</span></div>
                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augRobotOffset" checked> Initial Noise</label><span style="font-size:0.72rem;color:#aaa">— offset initial joint positions</span></div>
                <div style="display:flex;align-items:baseline;gap:4px"><label><input type="checkbox" id="augRobotJitter" checked> Trajectory Jitter</label><span style="font-size:0.72rem;color:#aaa">— noise on action values</span></div>
              </div>
              <div id="augRobotParams"></div>
            </div>

            <div style="background:#f9f9f9;border:1px solid #e0e0e0;border-radius:6px;padding:10px">
              <label style="font-weight:600;font-size:0.85rem"><input type="checkbox" id="augLangEnabled"> Language Variation</label>
              <div style="font-size:0.75rem;color:#999;margin:2px 0 4px 18px">Create task text variations for language-conditioned policies</div>
              <div style="padding-left:18px;margin-top:4px;font-size:0.82rem;color:#666">
                <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px"><label><input type="checkbox" id="augLangSyn" checked> Synonym/Paraphrase</label><span style="font-size:0.72rem;color:#aaa">— rephrase task description</span></div>
                <div style="display:flex;align-items:baseline;gap:4px"><label><input type="checkbox" id="augLangTypo"> Typo</label><span style="font-size:0.72rem;color:#aaa">— small typos for robustness</span></div>
              </div>
            </div>
          </div>

          <div style="display:flex;gap:10px;align-items:center">
            <button class="btn" id="augBtn" onclick="doAugment('${name}')" style="background:#7b1fa2">Start Augmentation</button>
            <button class="btn btn-sm btn-ghost" onclick="closeModal()">Cancel</button>
          </div>
          <div id="augProgress" style="display:none;margin-top:12px">
            <div style="background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px">
              <div id="augProgressBar" style="height:100%;background:#7b1fa2;width:0%;transition:width 0.3s"></div>
            </div>
            <span id="augStatus" style="font-size:0.85rem;color:#888"></span>
          </div>

        </div>

        <!-- Right column: Preview -->
        <div style="flex:1;min-width:0;position:sticky;top:0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <label class="form-label" style="margin:0">Preview (5 random episodes)</label>
            <span id="augPreviewStatus" style="font-size:0.72rem;color:#aaa"></span>
          </div>
          <div id="augPreviewGrid" style="display:grid;grid-template-columns:1fr;gap:10px;min-height:60px;background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;padding:10px">
            <div style="text-align:center;color:#bbb;font-size:0.8rem;padding:16px 0">Loading preview...</div>
          </div>
        </div>
      </div>
    `;
    document.querySelector('.modal').classList.add('modal-wide');
    document.getElementById('modalOverlay').classList.add('visible');

    // Setup preview auto-update
    window._augPreviewName = name;
    window._augTotalEps = totalEps;
    _augPreviewUpdate();
    updateAugSummary(totalEps);
    renderAugParams();

    // Listen for changes on all augment controls
    const watchIds = ['augCamEnabled','augCamPersp','augCamAffine','augCamRot',
      'augLightEnabled','augLightBright','augLightContrast','augLightSat','augLightJitter','augLightShadow','augLightNoise','augLightBlur',
      'augRobotEnabled','augRobotStart','augRobotOffset','augRobotJitter',
      'augLangEnabled','augLangSyn','augLangTypo','augIntensity'];
    watchIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', _augPreviewDebounce);
        el.addEventListener('input', () => { updateAugSummary(totalEps); renderAugParams(); });
      }
    });

  } catch(e) { alert(e.message); }
}

window._augMode = 'random';

function setAugMult(mult, totalEps, name) {
  const target = mult * totalEps;
  document.getElementById('augTargetEps').value = target;
  document.querySelectorAll('.aug-mult').forEach(b => {
    const m = parseInt(b.dataset.mult);
    b.style.background = m === mult ? '#e8f0fe' : '#fff';
    b.style.color = m === mult ? '#1a73e8' : '#555';
  });
  updateAugName(name);
  updateAugSummary(totalEps);
}

function updateAugName(name) {
  const v = document.getElementById('augTargetEps').value;
  document.getElementById('augNewName').value = name + '_aug' + v;
}

function setAugMode(mode) {
  window._augMode = mode;
  document.getElementById('augModeRandom').style.background = mode === 'random' ? '#e8f0fe' : '#fff';
  document.getElementById('augModeRandom').style.color = mode === 'random' ? '#1a73e8' : '#555';
  document.getElementById('augModeRandom').style.borderColor = mode === 'random' ? '#90caf9' : '#d0d0d0';
  document.getElementById('augModeFix').style.background = mode === 'fix' ? '#e8f0fe' : '#fff';
  document.getElementById('augModeFix').style.color = mode === 'fix' ? '#1a73e8' : '#555';
  document.getElementById('augModeFix').style.borderColor = mode === 'fix' ? '#90caf9' : '#d0d0d0';
  document.getElementById('augModeDesc').textContent = mode === 'random'
    ? 'Random source episode per augmented copy'
    : 'Even copies per episode (each episode gets equal augmentations)';
  updateAugSummary(window._augTotalEps || 0);
  renderAugParams();
}

function updateAugSummary(totalEps) {
  window._augTotalEps = totalEps;
  const target = parseInt(document.getElementById('augTargetEps')?.value || 0);
  const intensity = parseInt(document.getElementById('augIntensity')?.value || 3);
  const mode = window._augMode || 'random';
  const mult = totalEps > 0 ? (target / totalEps).toFixed(1) : '?';
  document.getElementById('augMultLabel').textContent = `(${mult}x of ${totalEps})`;

  const intensityLabels = {1:'Subtle',2:'Light',3:'Medium',4:'Strong',5:'Extreme'};
  const techs = [];
  if (document.getElementById('augCamEnabled')?.checked) techs.push('Camera Shift');
  if (document.getElementById('augLightEnabled')?.checked) techs.push('Light & Quality');
  if (document.getElementById('augRobotEnabled')?.checked) techs.push('Robot Noise');
  if (document.getElementById('augLangEnabled')?.checked) techs.push('Language');

  const copiesPerEp = mode === 'fix' && totalEps > 0 ? Math.floor(target / totalEps) : '~' + (totalEps > 0 ? Math.round(target / totalEps) : '?');

  const el = document.getElementById('augSummary');
  if (el) el.innerHTML = [
    `<b>Source:</b> ${totalEps} eps &rarr; <b>Target:</b> ${target} eps (${mult}x)`,
    `<b>Mode:</b> ${mode === 'random' ? 'Random pick' : 'Fix ('+copiesPerEp+' copies/ep)'}`,
    `<b>Intensity:</b> ${intensity}/5 (${intensityLabels[intensity] || 'Medium'})`,
    `<b>Techniques:</b> ${techs.length ? techs.join(', ') : 'None'}`,
  ].join('<br>');
}

function renderAugParams() {
  const mode = window._augMode || 'random';
  const intensity = parseInt(document.getElementById('augIntensity')?.value || 3);
  const SM = {1:0.25, 2:0.5, 3:1.0, 4:1.5, 5:2.0};
  const s = SM[intensity] || 1.0;
  const pstyle = 'margin-top:6px;padding:6px 10px;background:#eef6ff;border-radius:4px;font-size:0.72rem;color:#555;line-height:1.9';

  function rng(label, lo, hi, unit) {
    return `<div><span style="color:#888">${label}:</span> <b>${lo}</b> ~ <b>${hi}</b>${unit||''}</div>`;
  }
  function sld(id, label, min, max, step, val, unit) {
    return `<div style="display:flex;align-items:center;gap:4px;margin-bottom:1px">
      <span style="min-width:76px;color:#888">${label}:</span>
      <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="flex:1;height:12px" oninput="this.nextElementSibling.textContent=this.value;_augPreviewDebounce()">
      <span style="min-width:38px;text-align:right;font-family:'SF Mono',monospace;font-size:0.72rem">${val}</span><span style="color:#aaa;font-size:0.68rem">${unit||''}</span>
    </div>`;
  }

  // Camera
  const camEl = document.getElementById('augCamParams');
  if (camEl) {
    const en = document.getElementById('augCamEnabled')?.checked;
    const persp = en && document.getElementById('augCamPersp')?.checked;
    const affine = en && document.getElementById('augCamAffine')?.checked;
    const rot = en && document.getElementById('augCamRot')?.checked;
    let h = '';
    if (en && (persp||affine||rot)) {
      if (mode==='random') {
        if (persp) h += rng('Perspective', (-0.05*s).toFixed(3), (0.05*s).toFixed(3));
        if (affine) { h += rng('Translate', (-0.04*s).toFixed(3), (0.04*s).toFixed(3)); h += rng('Scale', (1-0.05*s).toFixed(2), (1+0.05*s).toFixed(2)); h += rng('Shear', (-0.03*s).toFixed(3), (0.03*s).toFixed(3)); }
        if (rot) h += rng('Rotation', (-4*s).toFixed(1), (4*s).toFixed(1), '°');
      } else {
        if (persp) h += sld('afPersp','Perspective', 0, 0.10, 0.005, (0.03*s).toFixed(3));
        if (affine) { h += sld('afTx','Translate X', -0.08, 0.08, 0.005, (0.02*s).toFixed(3)); h += sld('afTy','Translate Y', -0.08, 0.08, 0.005, (0.02*s).toFixed(3)); h += sld('afScale','Scale', 0.90, 1.10, 0.01, '1.00'); h += sld('afShear','Shear', -0.06, 0.06, 0.005, '0.000'); }
        if (rot) h += sld('afAngle','Rotation', -8, 8, 0.5, (2*s).toFixed(1), '°');
      }
    }
    camEl.innerHTML = h ? `<div style="${pstyle}">${h}</div>` : '';
  }

  // Light
  const lightEl = document.getElementById('augLightParams');
  if (lightEl) {
    const en = document.getElementById('augLightEnabled')?.checked;
    let h = '';
    if (en) {
      const bright = document.getElementById('augLightBright')?.checked;
      const contrast = document.getElementById('augLightContrast')?.checked;
      const sat = document.getElementById('augLightSat')?.checked;
      const jitter = document.getElementById('augLightJitter')?.checked;
      const shadow = document.getElementById('augLightShadow')?.checked;
      const noise = document.getElementById('augLightNoise')?.checked;
      const blur = document.getElementById('augLightBlur')?.checked;
      if (bright||contrast||sat||jitter||shadow||noise||blur) {
        if (mode==='random') {
          if (bright) h += rng('Brightness', (1-0.25*s).toFixed(2), (1+0.25*s).toFixed(2));
          if (contrast) h += rng('Contrast', (1-0.25*s).toFixed(2), (1+0.25*s).toFixed(2));
          if (sat) h += rng('Saturation', (1-0.35*s).toFixed(2), (1+0.35*s).toFixed(2));
          if (jitter) h += rng('Hue shift', '-'+Math.round(8*s), '+'+Math.round(8*s));
          if (shadow) h += rng('Shadow α', (0.15*s).toFixed(2), (0.4*s).toFixed(2));
          if (noise) h += rng('Noise σ', (4*s).toFixed(1), (12*s).toFixed(1));
          if (blur) h += rng('Blur σ', (0.4*s).toFixed(1), (1.2*s).toFixed(1));
        } else {
          if (bright) h += sld('afBright','Brightness', 0.50, 1.50, 0.01, (1+0.12*s).toFixed(2));
          if (contrast) h += sld('afContrast','Contrast', 0.50, 1.50, 0.01, (1+0.12*s).toFixed(2));
          if (sat) h += sld('afSat','Saturation', 0.30, 1.70, 0.01, (1+0.15*s).toFixed(2));
          if (jitter) h += sld('afHue','Hue shift', -16, 16, 1, Math.round(4*s));
          if (shadow) h += sld('afShadowA','Shadow α', 0.0, 0.80, 0.05, (0.25*s).toFixed(2));
          if (noise) h += sld('afNoiseS','Noise σ', 0, 24, 0.5, (8*s).toFixed(1));
          if (blur) h += sld('afBlurS','Blur σ', 0.0, 2.4, 0.1, (0.8*s).toFixed(1));
        }
      }
    }
    lightEl.innerHTML = h ? `<div style="${pstyle}">${h}</div>` : '';
  }

  // Robot
  const robotEl = document.getElementById('augRobotParams');
  if (robotEl) {
    const en = document.getElementById('augRobotEnabled')?.checked;
    let h = '';
    if (en) {
      const trim = document.getElementById('augRobotStart')?.checked;
      const offset = document.getElementById('augRobotOffset')?.checked;
      const jit = document.getElementById('augRobotJitter')?.checked;
      if (trim||offset||jit) {
        if (mode==='random') {
          if (trim) h += rng('Start trim', '1', Math.max(1,Math.round(30*0.12*s)).toString(), ' frames');
          if (offset) h += rng('Offset σ', '0', (1.5*s).toFixed(1), '°');
          if (jit) h += rng('Jitter σ', (0.3*s).toFixed(1), (1.0*s).toFixed(1));
        } else {
          if (trim) h += sld('afTrim','Trim', 0, 30, 1, Math.min(Math.round(3*s), 20), ' frames');
          if (offset) h += sld('afOffsetS','Offset σ', 0.0, 3.0, 0.1, (1.0*s).toFixed(1), '°');
          if (jit) h += sld('afJitterS','Jitter σ', 0.0, 2.0, 0.1, (0.5*s).toFixed(1));
        }
      }
    }
    robotEl.innerHTML = h ? `<div style="${pstyle}">${h}</div>` : '';
  }
}

function getFixedParams() {
  if (window._augMode !== 'fix') return null;
  const rv = id => { const el = document.getElementById(id); return el ? parseFloat(el.value) : null; };
  return {
    camera: { persp_mag: rv('afPersp'), tx: rv('afTx'), ty: rv('afTy'), shear: rv('afShear'), scale: rv('afScale'), angle: rv('afAngle') },
    light: { brightness: rv('afBright'), contrast: rv('afContrast'), saturation: rv('afSat'), hue: rv('afHue'), sat_off: rv('afSatOff'), shadow_a: rv('afShadowA'), noise_s: rv('afNoiseS'), blur_s: rv('afBlurS') },
    robot: { trim: rv('afTrim'), offset_sigma: rv('afOffsetS'), jitter_s: rv('afJitterS') },
  };
}

let _augPreviewTimer = null;
function _augPreviewDebounce() {
  clearTimeout(_augPreviewTimer);
  _augPreviewTimer = setTimeout(_augPreviewUpdate, 300);
}

async function _augPreviewUpdate() {
  const name = window._augPreviewName;
  if (!name) return;
  const grid = document.getElementById('augPreviewGrid');
  const st = document.getElementById('augPreviewStatus');
  if (!grid) return;
  st.textContent = 'Generating...';

  const intensity = parseInt(document.getElementById('augIntensity')?.value || 3);
  const techniques = {
    camera: {
      enabled: document.getElementById('augCamEnabled')?.checked,
      perspective: document.getElementById('augCamPersp')?.checked,
      affine: document.getElementById('augCamAffine')?.checked,
      rotation: document.getElementById('augCamRot')?.checked,
    },
    light: {
      enabled: document.getElementById('augLightEnabled')?.checked,
      brightness: document.getElementById('augLightBright')?.checked,
      contrast: document.getElementById('augLightContrast')?.checked,
      saturation: document.getElementById('augLightSat')?.checked,
      color_jitter: document.getElementById('augLightJitter')?.checked,
      shadow: document.getElementById('augLightShadow')?.checked,
      noise: document.getElementById('augLightNoise')?.checked,
      blur: document.getElementById('augLightBlur')?.checked,
    },
  };

  try {
    const r = await fetch(`/api/datasets/${name}/augment-preview`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ intensity, techniques, count: 5, mode: window._augMode || 'random', fixed_params: getFixedParams() }),
    });
    const d = await r.json();
    if (!d.ok || !d.previews?.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#d93025;font-size:0.8rem;padding:16px 0">No preview available</div>';
      st.textContent = '';
      return;
    }
    grid.innerHTML = d.previews.map(p => `
      <div style="display:flex;gap:6px;align-items:center">
        <div style="font-size:0.68rem;color:#999;min-width:32px;text-align:right">Ep ${p.ep}</div>
        <div style="flex:1;text-align:center">
          <img src="data:image/jpeg;base64,${p.original}" style="width:100%;border-radius:4px;border:1px solid #e0e0e0">
          <div style="font-size:0.6rem;color:#aaa">original</div>
        </div>
        <div style="font-size:0.8rem;color:#ccc">&rarr;</div>
        <div style="flex:1;text-align:center">
          <img src="data:image/jpeg;base64,${p.augmented}" style="width:100%;border-radius:4px;border:2px solid #7b1fa2">
          <div style="font-size:0.6rem;color:#7b1fa2">augmented</div>
        </div>
      </div>
    `).join('');
    st.textContent = '';
  } catch(e) {
    st.textContent = 'Error';
    console.error(e);
  }
}

async function doAugment(name) {
  const targetEps = parseInt(document.getElementById('augTargetEps').value);
  const newName = document.getElementById('augNewName').value.trim();
  const intensity = parseInt(document.getElementById('augIntensity').value);
  if (!newName) { alert('Enter a dataset name'); return; }

  const techniques = {
    camera_shift: {
      enabled: document.getElementById('augCamEnabled').checked,
      perspective: document.getElementById('augCamPersp').checked,
      affine: document.getElementById('augCamAffine').checked,
      rotation: document.getElementById('augCamRot').checked,
    },
    light_quality: {
      enabled: document.getElementById('augLightEnabled').checked,
      brightness: document.getElementById('augLightBright').checked,
      contrast: document.getElementById('augLightContrast').checked,
      saturation: document.getElementById('augLightSat').checked,
      color_jitter: document.getElementById('augLightJitter').checked,
      shadow: document.getElementById('augLightShadow').checked,
      noise: document.getElementById('augLightNoise').checked,
      blur: document.getElementById('augLightBlur').checked,
    },
    robot_noise: {
      enabled: document.getElementById('augRobotEnabled').checked,
      random_start: document.getElementById('augRobotStart').checked,
      initial_noise: document.getElementById('augRobotOffset').checked,
      trajectory_jitter: document.getElementById('augRobotJitter').checked,
    },
    language: {
      enabled: document.getElementById('augLangEnabled').checked,
      synonym: document.getElementById('augLangSyn').checked,
      paraphrase: document.getElementById('augLangSyn').checked,
      typo: document.getElementById('augLangTypo').checked,
    },
  };

  const btn = document.getElementById('augBtn');
  btn.disabled = true;
  document.getElementById('augProgress').style.display = '';

  try {
    const r = await fetch(`/api/datasets/${name}/augment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName, target_episodes: targetEps, intensity, techniques, mode: window._augMode || 'random', fixed_params: getFixedParams() }),
    });
    const d = await r.json();
    if (!d.ok) {
      document.getElementById('augStatus').textContent = d.error;
      document.getElementById('augStatus').style.color = '#d93025';
      btn.disabled = false;
      return;
    }
    const poll = setInterval(async () => {
      try {
        const sr = await fetch('/api/augment/status');
        const sd = await sr.json();
        document.getElementById('augProgressBar').style.width = sd.progress + '%';
        document.getElementById('augStatus').textContent = sd.status;
        if (sd.error) {
          document.getElementById('augStatus').style.color = '#d93025';
          clearInterval(poll);
          btn.disabled = false;
        } else if (!sd.running && sd.progress >= 100) {
          clearInterval(poll);
          closeModal();
          alert(`Augmentation complete! Created "${newName}"`);
          vizRefreshDatasets();
        }
      } catch(e) { /* ignore */ }
    }, 1000);
  } catch(e) {
    document.getElementById('augStatus').textContent = e.message;
    document.getElementById('augStatus').style.color = '#d93025';
    btn.disabled = false;
  }
}
</script>
