<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeRobot Dataset Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

    /* ── Layout ── */
    .app-layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar (left) ── */
    .sidebar { width: 330px; min-width: 200px; flex-shrink: 0; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-header { padding: 14px 16px 12px; border-bottom: 1px solid #e0e0e0; }
    .sidebar-header h1 { font-size: 1.05rem; font-weight: 800; color: #1a73e8; }

    .sidebar-section { padding: 12px 16px 8px; }
    .sidebar-section-title { font-size: 0.68rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

    .ds-select-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .ds-select-row select { flex: 1; padding: 7px 10px; border-radius: 6px; border: 1px solid #d0d0d0; font-size: 0.85rem; min-width: 0; }
    .ds-select-row button { padding: 6px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.85rem; color: #666; }
    .ds-select-row button:hover { background: #f5f5f5; }

    .ds-info-card { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 0.82rem; }
    .ds-info-row { display: flex; justify-content: space-between; margin-bottom: 3px; align-items: flex-start; }
    .ds-info-row .label { color: #888; flex-shrink: 0; }
    .ds-info-row .value { font-weight: 600; color: #333; text-align: right; }

    /* ── Resizer handles ── */
    .resizer { width: 5px; cursor: col-resize; background: transparent; flex-shrink: 0; position: relative; z-index: 10; }
    .resizer:hover, .resizer.active { background: #1a73e8; opacity: 0.3; }

    /* ── Right panel (episodes) ── */
    .right-panel { width: 230px; min-width: 160px; flex-shrink: 0; background: #fff; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    .right-panel.hidden { display: none; }
    .episode-list-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; }
    .episode-list-header span { font-size: 0.78rem; font-weight: 700; color: #1a73e8; }
    .episode-list { flex: 1; overflow-y: auto; }

    /* ── Main content ── */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .main-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 14px; border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; color: #fff; background: #1a73e8; transition: all 0.15s; white-space: nowrap; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; }
    .btn-xs { padding: 2px 8px; font-size: 0.72rem; border-radius: 4px; }
    .btn-danger { background: #d93025; }
    .btn-ghost { background: transparent; color: #555; border: 1px solid #d0d0d0; }
    .btn-ghost:hover { background: #f5f5f5; }

    /* ── Sidebar action button ── */
    .sb-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 12px; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: #333; background: #f5f5f5; transition: background 0.12s; text-align: left; }
    .sb-btn:hover { background: #e8f0fe; color: #1a73e8; }
    .sb-btn .sb-icon { width: 18px; text-align: center; font-size: 0.9rem; flex-shrink: 0; }

    /* ── Player card ── */
    .player-card { background: #fff; border: 1px solid #d0d0d0; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .player-card h3 { font-size: 0.9rem; font-weight: 700; color: #1a73e8; margin-bottom: 12px; }

    /* ── Stats ── */
    .viz-stat { background: #f8f9fa; border-radius: 8px; padding: 10px 14px; min-width: 100px; }
    .viz-stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .viz-stat-value { font-size: 1.1rem; font-weight: 700; color: #333; margin-top: 2px; }

    /* ── Episode items ── */
    .viz-ep-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; transition: background 0.15s; display: flex; align-items: flex-start; gap: 0; }
    .viz-ep-item:hover { background: #f0f4ff; }
    .viz-ep-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; border-left: 3px solid #1a73e8; }
    .viz-ep-item .ep-meta { font-size: 0.75rem; color: #999; margin-top: 2px; }

    /* ── Form ── */
    .form-label { font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 4px; display: block; }
    .form-input { width: 100%; padding: 8px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 0.88rem; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.visible { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 28px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .modal.modal-wide { max-width: 92vw; width: 92vw; }
    .modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #999; }
    .modal-close:hover { color: #333; }
    .tg-tab { padding:8px 20px; font-size:0.88rem; font-weight:600; color:#888; background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
    .tg-tab:hover { color:#1a73e8; }
    .tg-tab.active { color:#1a73e8; border-bottom-color:#1a73e8; }
    .train-cmd { position:relative; background:#1e1e1e; color:#d4d4d4; font-family:'SF Mono','Menlo','Consolas',monospace; font-size:0.75rem; line-height:1.7; padding:16px 50px 16px 20px; border-radius:8px; white-space:pre; overflow-x:auto; margin:6px 0 14px 0; }

    /* ── Import drop zone ── */
    .import-drop-zone { border: 2px dashed #c0c0c0; border-radius: 12px; padding: 28px 20px; text-align: center; cursor: default; transition: all 0.2s; background: #fafafa; }
    .import-drop-zone:hover { border-color: #90caf9; background: #f5f9ff; }
    .import-drop-zone.drag-over { border-color: #00897b; background: #e0f2f1; border-style: solid; }
    .import-drop-zone .drop-icon { font-size: 2.2rem; margin-bottom: 6px; opacity: 0.7; }
    .import-drop-zone .drop-text { font-size: 0.95rem; font-weight: 700; color: #555; }
    .import-drop-zone .drop-hint { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
    .import-drop-zone.drag-over .drop-text { color: #00897b; }
    .import-drop-zone.drag-over .drop-hint { color: #00897b; }

    /* ── Edit task options ── */
    .edit-task-option { padding: 8px 12px; cursor: pointer; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; transition: background 0.12s; }
    .edit-task-option:last-child { border-bottom: none; }
    .edit-task-option:hover { background: #f0f4ff; }
    .edit-task-option.active { background: #e8f0fe; color: #1a73e8; font-weight: 600; }

    /* ── No dataset state ── */
    .empty-state { text-align: center; padding: 60px 24px; color: #999; }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h3 { font-size: 1rem; color: #666; margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="app-layout">

  <!-- ═══════════ Sidebar ═══════════ -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>LeRobot Dataset Manager</h1>
    </div>

    <!-- Dataset selector -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Dataset</div>
      <div class="ds-select-row">
        <select id="vizDatasetSelect">
          <option value="">-- Select --</option>
        </select>
      </div>
      <div id="vizDatasetStatus" style="font-size:0.75rem;color:#888;margin-bottom:2px"></div>
      <div id="dsManageRow" style="display:none;display:flex;gap:4px;margin-top:4px;display:none">
        <button class="btn-xs btn-ghost" onclick="vizRenameDataset()" style="flex:1">&#9998; Rename</button>
        <button class="btn-xs btn-ghost" onclick="vizShowDeleteDataset()" style="flex:1;color:#d93025;border-color:#f5c6cb">&#128465; Delete</button>
      </div>
    </div>

    <!-- Always-available actions -->
    <div class="sidebar-section" style="padding-top:0">
      <div style="display:flex;flex-direction:column;gap:3px">
        <button class="sb-btn" onclick="vizShowConfig()"><span class="sb-icon">&#9881;</span> Settings</button>
        <button class="sb-btn" onclick="vizShowImport()"><span class="sb-icon">&#128229;</span> Import Dataset</button>
        <button class="sb-btn" onclick="vizShowDownloadHf()"><span class="sb-icon">&#9729;</span> Download from HF</button>
        <button class="sb-btn" onclick="vizShowCombine()"><span class="sb-icon">&#128279;</span> Combine Datasets</button>
      </div>
    </div>

    <!-- Dataset info (shown when selected) -->
    <div id="dsInfoPanel" style="display:none">
      <div style="border-top:1px solid #e0e0e0"></div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Info</div>
        <div class="ds-info-card" id="dsInfoCard"></div>
      </div>

      <!-- Episodes list (in sidebar) -->
      <div style="border-top:1px solid #e0e0e0"></div>
      <div class="sidebar-section" style="padding-bottom:0;flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="episode-list-header" style="padding:4px 0 6px;background:none;border-bottom:none">
          <span style="font-size:0.68rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.8px">Episodes</span>
          <div style="display:flex;gap:4px">
            <button class="btn-xs btn-ghost" id="vizSelectModeBtn" onclick="vizToggleSelectMode()">Select</button>
          </div>
        </div>
        <div id="vizSelectActions" style="display:none;padding:0 0 6px;display:none;gap:4px">
          <button class="btn-xs btn-ghost" id="vizSelectAllBtn" onclick="vizSelectAll()">Select All</button>
          <button class="btn-xs btn-ghost" id="vizEditTaskBtn" onclick="vizEditTaskSelected()" style="display:none;color:#1a73e8;border-color:#90caf9">Edit Task</button>
          <button class="btn-xs btn-danger" id="vizDeleteBtn" onclick="vizDeleteSelected()" style="display:none">Delete</button>
        </div>
        <div class="episode-list" id="vizEpisodeList" style="flex:1;overflow-y:auto"></div>
      </div>
    </div>

    <select id="vizEpisodeSelect" style="display:none"></select>
  </div>

  <!-- Resizer: left -->
  <div class="resizer" id="resizerLeft"></div>

  <!-- ═══════════ Main ═══════════ -->
  <div class="main-content">
    <div class="main-body">

      <!-- No dataset selected -->
      <div id="vizEmptyState" class="empty-state">
        <div class="empty-icon">&#128196;</div>
        <h3>Select a dataset to visualize</h3>
        <p>Choose from the sidebar, or use Import / Download to add one.</p>
      </div>

      <!-- Visualizer content -->
      <div id="vizContent" style="display:none">
        <!-- Info bar -->
        <div id="vizInfoGrid" style="display:flex;gap:12px;flex-wrap:wrap;font-size:0.88rem;margin-bottom:16px"></div>

        <!-- Player controls -->
        <div class="player-card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
            <button class="btn btn-sm" id="vizPlayBtn" onclick="vizTogglePlay()" style="background:#34a853;min-width:70px">Play</button>
            <span id="vizTimeDisplay" style="font-size:0.95rem;font-weight:600;font-family:'SF Mono','Menlo',monospace;color:#333;min-width:50px">0.0s</span>
            <span id="vizPhaseLabel" style="font-size:0.82rem;font-weight:600;padding:2px 10px;border-radius:10px;background:#e8eaed;color:#555;display:none"></span>
            <span id="vizEpisodeInfo" style="font-size:0.82rem;color:#888"></span>
          </div>
          <input type="range" id="vizScrubber" min="0" max="100" value="0" step="0.1" style="width:100%" oninput="vizScrub(this.value)">
          <div id="vizSegmentBar" style="position:relative;height:26px;border-radius:4px;overflow:visible;margin-top:4px;cursor:pointer;user-select:none"></div>
          <div style="display:flex;align-items:center;margin-top:2px">
            <span id="vizSegInfo" style="font-size:0.7rem;color:#999"></span>
            <span style="font-size:0.65rem;color:#bbb;margin-left:auto">Click = change phase | Double-click = split | Drag handle = adjust</span>
          </div>
        </div>

        <!-- Videos -->
        <div id="vizVideos" style="display:flex;flex-direction:column;gap:12px;margin-bottom:12px"></div>

        <!-- Joint chart -->
        <div class="player-card">
          <h3>Joint Trajectories</h3>
          <div style="position:relative">
            <canvas id="vizChart" style="width:100%;max-height:300px"></canvas>
            <div id="vizChartCursor" style="position:absolute;top:0;bottom:0;width:2px;background:rgba(234,67,53,0.7);pointer-events:none;display:none"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Resizer: right -->
  <div class="resizer" id="resizerRight"></div>

  <!-- ═══════════ Right panel: Actions ═══════════ -->
  <div class="right-panel hidden" id="rightPanel">
    <div class="episode-list-header">
      <span>Actions</span>
    </div>
    <div style="padding:12px 14px;display:flex;flex-direction:column;gap:3px">
      <div class="sidebar-section-title" style="margin-bottom:4px">Process</div>
      <button class="sb-btn" onclick="vizShowAugment()"><span class="sb-icon">&#127912;</span> Augment</button>
      <button class="sb-btn" onclick="vizRemoveIdle()"><span class="sb-icon">&#9986;</span> Remove Idle</button>
      <button class="sb-btn" onclick="vizShowRandomSubset()"><span class="sb-icon">&#127922;</span> Random Sample</button>

      <div class="sidebar-section-title" style="margin-top:10px;margin-bottom:4px">Export</div>
      <button class="sb-btn" onclick="vizShowPushHf()"><span class="sb-icon">&#128640;</span> Push to HF</button>
      <button class="sb-btn" onclick="vizShowTraining()"><span class="sb-icon">&#129504;</span> Training</button>
      <button class="sb-btn" onclick="vizShowInference()"><span class="sb-icon">&#9654;</span> Inference</button>

    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal"><button class="modal-close" onclick="closeModal()">&times;</button><div id="modalBody"></div></div>
</div>

<script>
// ============================================================
// Global state
// ============================================================
let vizCurrentDataset = null;
let vizCurrentTask = null;
let vizEpisodesData = [];
let vizEpStart = 0;
let vizEpEnd = 0;
let vizFrameCount = 0;
let vizPlaying = false;
let vizAnimFrame = null;
let vizChart = null;
let vizSegments = null;
let vizDragHandle = null;
let vizDragMoved = false;
let vizSelectMode = false;
let vizAllDatasets = [];

const VIZ_COLORS = ['#1a73e8','#ea4335','#34a853','#fbbc04','#9c27b0','#ff6d00'];
const VIZ_JOINTS = ['shoulder_pan','shoulder_lift','elbow_flex','wrist_flex','wrist_roll','gripper'];
const VIZ_PHASES_CYCLE = ['idle', 'movement'];
const VIZ_PHASE = {
  idle:     { color: '#f0f0f0', text: '#999' },
  movement: { color: '#bbdefb', text: '#1565c0' },
};

// Chart plugin for segment backgrounds
const vizSegmentPlugin = {
  id: 'segmentBg',
  beforeDraw(chart) {
    if (!vizSegments) return;
    const { ctx, chartArea, scales } = chart;
    if (!chartArea) return;
    const xScale = scales.x;
    ctx.save();
    vizSegments.forEach(seg => {
      const st = VIZ_PHASE[seg.phase] || VIZ_PHASE.idle;
      const x1 = xScale.getPixelForValue(seg.start);
      const x2 = xScale.getPixelForValue(seg.end);
      ctx.fillStyle = st.color + '66';
      ctx.fillRect(x1, chartArea.top, x2 - x1, chartArea.bottom - chartArea.top);
    });
    ctx.restore();
  }
};

// ============================================================
// Resizable panels
// ============================================================
(function setupResizers() {
  function initResizer(resizerId, target, side) {
    const resizer = document.getElementById(resizerId);
    if (!resizer) return;
    let startX, startW;
    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      const el = document.querySelector(target);
      startX = e.clientX;
      startW = el.offsetWidth;
      resizer.classList.add('active');
      const onMove = ev => {
        const dx = ev.clientX - startX;
        const newW = side === 'left' ? startW + dx : startW - dx;
        el.style.width = Math.max(140, Math.min(500, newW)) + 'px';
      };
      const onUp = () => {
        resizer.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
  initResizer('resizerLeft', '.sidebar', 'left');
  initResizer('resizerRight', '.right-panel', 'right');
})();

// ============================================================
// Editable tasks
// ============================================================

// ============================================================
// Modal
// ============================================================
function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); document.querySelector('.modal').classList.remove('modal-wide'); }

// ============================================================
// Init
// ============================================================
(async function init() {
  vizRefreshDatasets();
})();

// ============================================================
// Dataset list
// ============================================================
async function vizRefreshDatasets() {
  const sel = document.getElementById('vizDatasetSelect');
  const st = document.getElementById('vizDatasetStatus');
  st.textContent = 'Loading...';
  try {
    const r = await fetch('/api/datasets');
    const d = await r.json();
    sel.innerHTML = '<option value="">-- Select --</option>';
    (d.datasets || []).forEach(ds => {
      const o = document.createElement('option');
      o.value = ds.name;
      o.textContent = `${ds.name} (${ds.total_episodes} eps)`;
      sel.appendChild(o);
    });
    st.textContent = `${(d.datasets || []).length} datasets`;
  } catch(e) { st.textContent = 'Error: ' + e.message; }
}

// ============================================================
// Dataset change handler
// ============================================================
document.getElementById('vizDatasetSelect').addEventListener('focus', () => vizRefreshDatasets());
document.getElementById('vizDatasetSelect').addEventListener('change', async function() {
  const name = this.value;
  const dsInfoPanel = document.getElementById('dsInfoPanel');
  const rightPanel = document.getElementById('rightPanel');
  const vizContent = document.getElementById('vizContent');
  const vizEmpty = document.getElementById('vizEmptyState');

  if (!name) {
    dsInfoPanel.style.display = 'none';
    document.getElementById('dsManageRow').style.display = 'none';
    document.getElementById('vizDatasetStatus').style.display = '';
    rightPanel.classList.add('hidden');
    document.getElementById('vizEpisodeList').innerHTML = '';
    vizContent.style.display = 'none';
    vizEmpty.style.display = '';
    vizCurrentDataset = null;
    return;
  }
  vizCurrentDataset = name;
  vizEmpty.style.display = 'none';
  document.getElementById('vizDatasetStatus').style.display = 'none';
  rightPanel.classList.remove('hidden');

  try {
    const r = await fetch(`/api/datasets/${name}/info`);
    const d = await r.json();
    if (!d.ok) return;
    const info = d.info;
    const allTasks = d.tasks || [];
    window._allTasks = allTasks;
    const task = allTasks.length ? allTasks[0] : '-';
    vizCurrentTask = task;

    // Fetch episodes metadata
    const epR = await fetch(`/api/datasets/${name}/episodes`);
    const epD = await epR.json();
    vizEpisodesData = epD.ok ? epD.episodes : [];

    // Sidebar info card
    const infoCard = document.getElementById('dsInfoCard');
    infoCard.innerHTML = `
      <div class="ds-info-row"><span class="label">Episodes</span><span class="value">${info.total_episodes}</span></div>
      <div class="ds-info-row"><span class="label">Frames</span><span class="value">${info.total_frames}</span></div>
      <div class="ds-info-row"><span class="label">FPS</span><span class="value">${info.fps}</span></div>
      <div class="ds-info-row" style="margin-bottom:0"><span class="label">Robot</span><span class="value">${info.robot_type || '-'}</span></div>
    `;
    dsInfoPanel.style.display = '';
    document.getElementById('dsManageRow').style.display = 'flex';

    // Count episodes per task
    const TASK_COLORS = ['#1a73e8','#34a853','#a142f4','#e8710a','#e8453c','#00bcd4','#e91e90','#f9ab00','#8bc34a','#795548'];
    const taskCounts = {};
    const taskColorMap = {};
    let _ci = 0;
    vizEpisodesData.forEach(ep => {
      const ts = ep.tasks ? (Array.isArray(ep.tasks) ? ep.tasks : [ep.tasks]) : [];
      ts.forEach(t => {
        taskCounts[t] = (taskCounts[t] || 0) + 1;
        if (!(t in taskColorMap)) taskColorMap[t] = TASK_COLORS[_ci++ % TASK_COLORS.length];
      });
    });

    // Info grid (top of visualize tab)
    const grid = document.getElementById('vizInfoGrid');
    const taskKeys = Object.keys(taskCounts);
    let taskHtml;
    if (taskKeys.length <= 1) {
      taskHtml = `<div class="viz-stat"><div class="viz-stat-label">Task</div><div class="viz-stat-value" style="font-size:0.88rem">${task}</div></div>`;
    } else {
      const lines = taskKeys.map(t => `<div style="display:flex;justify-content:space-between;gap:8px"><span style="color:${taskColorMap[t]};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</span><span style="flex-shrink:0;font-weight:600">${taskCounts[t]}</span></div>`).join('');
      taskHtml = `<div class="viz-stat" style="flex:2;min-width:200px"><div class="viz-stat-label">Tasks (${taskKeys.length})</div><div class="viz-stat-value" style="font-size:0.82rem">${lines}<div style="border-top:1px solid #e0e0e0;margin-top:4px;padding-top:4px;display:flex;justify-content:space-between"><span>Total</span><span style="font-weight:700">${info.total_episodes}</span></div></div></div>`;
    }
    grid.innerHTML = [
      ['Episodes', info.total_episodes],
      ['Frames', info.total_frames],
      ['FPS', info.fps],
      ['Robot', info.robot_type],
    ].map(([l,v]) => `<div class="viz-stat"><div class="viz-stat-label">${l}</div><div class="viz-stat-value">${v}</div></div>`).join('') + taskHtml;

    // Build episode list
    const epSel = document.getElementById('vizEpisodeSelect');
    const epList = document.getElementById('vizEpisodeList');
    epSel.innerHTML = '';
    epList.innerHTML = '';
    vizSelectMode = false;
    const selModeBtn = document.getElementById('vizSelectModeBtn');
    if (selModeBtn) { selModeBtn.textContent = 'Select'; selModeBtn.style.color = ''; }
    const delBtn = document.getElementById('vizDeleteBtn');
    if (delBtn) delBtn.style.display = 'none';

    const vizTaskColorMap = {};
    let _tci = 0;
    vizEpisodesData.forEach(ep => {
      const ts = ep && ep.tasks ? (Array.isArray(ep.tasks) ? ep.tasks : [ep.tasks]) : [];
      ts.forEach(t => { if (!(t in vizTaskColorMap)) vizTaskColorMap[t] = TASK_COLORS[_tci++ % TASK_COLORS.length]; });
    });

    // Discover camera keys
    let cameraKeys = [];
    if (info.features) {
      cameraKeys = Object.keys(info.features).filter(k => k.startsWith('observation.images.'));
    }
    if (!cameraKeys.length && vizEpisodesData.length) {
      const ep0 = vizEpisodesData[0];
      const seen = new Set();
      for (const k of Object.keys(ep0)) {
        const m = k.match(/^videos\/(observation\.images\.\w+)\//);
        if (m && !seen.has(m[1])) { seen.add(m[1]); cameraKeys.push(m[1]); }
      }
    }
    window._cameraKeys = cameraKeys;

    // Check if this is an augmented dataset
    window._augConfig = null;
    try {
      const acR = await fetch(`/api/datasets/${name}/augment-config`);
      const acD = await acR.json();
      if (acD.ok && acD.is_augmented) {
        window._augConfig = acD.config;
      }
    } catch(e) {}
    // Disable/enable Augment button
    const augBtn = document.querySelector('.sb-btn[onclick="vizShowAugment()"]');
    if (augBtn) {
      if (window._augConfig) {
        augBtn.disabled = true;
        augBtn.style.opacity = '0.4';
        augBtn.style.pointerEvents = 'none';
        augBtn.title = 'This dataset was created by augmentation';
      } else {
        augBtn.disabled = false;
        augBtn.style.opacity = '';
        augBtn.style.pointerEvents = '';
        augBtn.title = '';
      }
    }

    for (let i = 0; i < info.total_episodes; i++) {
      const ep = vizEpisodesData[i];
      const len = ep ? ep.length : '?';
      const firstCam = cameraKeys[0] || 'observation.images.top';
      const dur = ep ? ((ep[`videos/${firstCam}/to_timestamp`] || 0) - (ep[`videos/${firstCam}/from_timestamp`] || 0)).toFixed(1) : '?';
      const o = document.createElement('option');
      o.value = i;
      epSel.appendChild(o);

      const div = document.createElement('div');
      div.className = 'viz-ep-item' + (i === 0 ? ' active' : '');
      div.dataset.ep = i;
      const epTasks = ep && ep.tasks ? (Array.isArray(ep.tasks) ? ep.tasks : [ep.tasks]) : [];
      const epTaskHtml = epTasks.map(t => { const c = vizTaskColorMap[t] || '#888'; return `<div style="font-size:0.68rem;color:${c};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t}</div>`; }).join('');
      div.innerHTML = `<input type="checkbox" class="viz-ep-cb" data-ep="${i}" style="display:none;margin-right:6px;margin-top:2px" onclick="event.stopPropagation();vizUpdateDeleteBtn()"><div style="flex:1;min-width:0"><span>Ep ${i}</span><div class="ep-meta">${len}f &middot; ${dur}s</div>${epTaskHtml}</div>`;
      div.addEventListener('click', () => {
        if (vizSelectMode) {
          const cb = div.querySelector('.viz-ep-cb');
          cb.checked = !cb.checked;
          vizUpdateDeleteBtn();
        } else {
          vizSelectEpisode(i);
        }
      });
      epList.appendChild(div);
    }

    vizContent.style.display = '';
    vizLoadEpisode();
  } catch(e) { console.error(e); }
});

// ============================================================
// Episode selection
// ============================================================
function vizSelectEpisode(idx) {
  document.getElementById('vizEpisodeSelect').value = idx;
  document.querySelectorAll('.viz-ep-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.ep) === idx);
  });
  vizLoadEpisode();
}

// ============================================================
// Episode loading
// ============================================================
async function vizLoadEpisode() {
  const ep = parseInt(document.getElementById('vizEpisodeSelect').value);
  const name = vizCurrentDataset;
  if (!name || isNaN(ep)) return;
  const epMeta = vizEpisodesData[ep] || {};

  vizStopPlay();

  const cameraKeys = window._cameraKeys || ['observation.images.top'];
  const firstCam = cameraKeys[0] || 'observation.images.top';
  vizEpStart = epMeta[`videos/${firstCam}/from_timestamp`] ?? 0;
  vizEpEnd = epMeta[`videos/${firstCam}/to_timestamp`] ?? 0;

  // Check augment config for this episode
  const augCompare = document.getElementById('vizAugCompare');
  if (augCompare) augCompare.remove();
  const cfg = window._augConfig;
  let srcEpMeta = null;
  let augEpInfo = null;
  if (cfg && cfg.episodes) {
    augEpInfo = cfg.episodes.find(e => e.new_ep === ep);
    if (augEpInfo && !augEpInfo.is_original) {
      try {
        const srcR = await fetch(`/api/datasets/${cfg.source_dataset}/episodes`);
        const srcD = await srcR.json();
        if (srcD.ok && srcD.episodes) {
          srcEpMeta = srcD.episodes.find(e => e.episode_index === augEpInfo.source_ep);
        }
      } catch(e) { console.warn('Could not load source episodes:', e); }
    }
  }

  // Videos — show original side-by-side if augmented
  const vids = document.getElementById('vizVideos');
  vids.innerHTML = '';
  vids.style.flexDirection = srcEpMeta ? 'column' : 'row';

  cameraKeys.forEach(cam => {
    const label = cam.split('.').pop();
    const camKey = `videos/${cam}`;
    const chunkIdx = epMeta[`${camKey}/chunk_index`] ?? 0;
    const fileIdx = epMeta[`${camKey}/file_index`] ?? 0;
    const chunk = String(chunkIdx).padStart(3, '0');
    const file = String(fileIdx).padStart(3, '0');
    const epStart = epMeta[`${camKey}/from_timestamp`] ?? vizEpStart;
    const epEnd = epMeta[`${camKey}/to_timestamp`] ?? vizEpEnd;
    const path = `/data/${name}/videos/${cam}/chunk-${chunk}/file-${file}.mp4`;

    if (srcEpMeta) {
      const ck = String(srcEpMeta[`${camKey}/chunk_index`] ?? 0).padStart(3, '0');
      const fi = String(srcEpMeta[`${camKey}/file_index`] ?? 0).padStart(3, '0');
      const srcPath = `/data/${cfg.source_dataset}/videos/${cam}/chunk-${ck}/file-${fi}.mp4`;
      const srcFrom = srcEpMeta[`${camKey}/from_timestamp`] ?? 0;
      vids.innerHTML += `
        <div style="display:flex;gap:12px">
          <div style="flex:1">
            <div style="font-size:0.72rem;color:#888;margin-bottom:4px">${label} <span style="color:#34a853;font-weight:600">original</span> (ep ${augEpInfo.source_ep})</div>
            <video muted preload="auto" style="width:100%;border-radius:8px;border:2px solid #34a853;background:#000" src="${srcPath}"
              onloadedmetadata="this.currentTime=${srcFrom}"></video>
          </div>
          <div style="flex:1">
            <div style="font-size:0.72rem;color:#888;margin-bottom:4px">${label} <span style="color:#7b1fa2;font-weight:600">augmented</span></div>
            <video muted preload="auto" class="viz-video" data-ep-start="${epStart}" data-ep-end="${epEnd}" style="width:100%;border-radius:8px;border:2px solid #7b1fa2;background:#000" src="${path}"></video>
          </div>
        </div>`;
    } else {
      vids.innerHTML += `
        <div style="flex:1;min-width:200px">
          <div style="font-size:0.82rem;font-weight:600;color:#555;margin-bottom:4px">${label}</div>
          <video muted preload="auto" class="viz-video" data-ep-start="${epStart}" data-ep-end="${epEnd}" style="width:100%;border-radius:8px;border:1px solid #e0e0e0;background:#000" src="${path}"></video>
        </div>`;
    }
  });

  // Seek videos to episode start
  document.querySelectorAll('.viz-video').forEach(v => {
    const startTime = parseFloat(v.dataset.epStart) || vizEpStart;
    v.addEventListener('loadedmetadata', () => { v.currentTime = startTime; });
  });

  // Show augmentation params info
  if (augEpInfo) {
    const srcName = cfg.source_dataset;
    const srcEp = augEpInfo.source_ep;
    const isOrig = augEpInfo.is_original;

    let paramHtml = '';
    if (isOrig) {
      paramHtml = '<span style="color:#34a853;font-weight:600">Original (no augmentation applied)</span>';
    } else {
      const parts = [];
      if (augEpInfo.camera) {
        const c = augEpInfo.camera;
        const cp = [];
        if (c.angle != null) cp.push(`rotation: ${Number(c.angle).toFixed(1)}°`);
        if (c.tx != null) cp.push(`tx: ${Number(c.tx).toFixed(3)}`);
        if (c.ty != null) cp.push(`ty: ${Number(c.ty).toFixed(3)}`);
        if (c.scale != null) cp.push(`scale: ${Number(c.scale).toFixed(3)}`);
        if (c.shear != null) cp.push(`shear: ${Number(c.shear).toFixed(3)}`);
        if (c.persp) cp.push('perspective: applied');
        if (cp.length) parts.push(`<b>Camera:</b> ${cp.join(', ')}`);
      }
      if (augEpInfo.light) {
        const l = augEpInfo.light;
        const lp = [];
        if (l.brightness != null) lp.push(`brightness: ${Number(l.brightness).toFixed(2)}`);
        if (l.contrast != null) lp.push(`contrast: ${Number(l.contrast).toFixed(2)}`);
        if (l.saturation != null) lp.push(`saturation: ${Number(l.saturation).toFixed(2)}`);
        if (l.hue != null) lp.push(`hue: ${l.hue}`);
        if (l.noise_s != null) lp.push(`noise: σ${Number(l.noise_s).toFixed(1)}`);
        if (l.blur_s != null) lp.push(`blur: σ${Number(l.blur_s).toFixed(1)}`);
        if (l.shadow_a != null) lp.push(`shadow: α${Number(l.shadow_a).toFixed(2)} ${l.shadow_dir||''}`);
        if (lp.length) parts.push(`<b>Light:</b> ${lp.join(', ')}`);
      }
      if (augEpInfo.robot) {
        const r = augEpInfo.robot;
        const rp = [];
        if (r.trim != null) rp.push(`trim: ${r.trim}f`);
        if (r.jitter_s != null) rp.push(`jitter: σ${Number(r.jitter_s).toFixed(2)}`);
        if (r.joint_offset) rp.push('offset: applied');
        if (rp.length) parts.push(`<b>Robot:</b> ${rp.join(', ')}`);
      }
      paramHtml = parts.length ? parts.join(' &nbsp;|&nbsp; ') : 'No augmentation params';
    }

    const compareDiv = document.createElement('div');
    compareDiv.id = 'vizAugCompare';
    compareDiv.innerHTML = `
      <div style="background:#f5f0ff;border:1px solid #d1c4e9;border-radius:8px;padding:8px 14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:0.82rem;font-weight:600;color:#7b1fa2">
            Augmented from ${srcName} ep ${srcEp}${isOrig ? ' (copy)' : ''}
          </span>
          <span style="font-size:0.72rem;color:#999">Mode: ${cfg.mode || 'random'} · Intensity: ${cfg.intensity || 3}/5</span>
        </div>
        <div style="font-size:0.73rem;color:#666;font-family:'SF Mono',monospace;margin-top:4px">${paramHtml}</div>
      </div>`;
    vids.parentNode.insertBefore(compareDiv, vids.nextSibling);
  }

  // Reset controls
  document.getElementById('vizScrubber').value = 0;
  document.getElementById('vizTimeDisplay').textContent = '0.0s';
  document.getElementById('vizSegmentBar').innerHTML = '';
  document.getElementById('vizPhaseLabel').style.display = 'none';
  vizSegments = null;

  // Load frame data
  const epInfo = document.getElementById('vizEpisodeInfo');
  epInfo.textContent = 'Loading frames...';
  try {
    const r = await fetch(`/api/datasets/${name}/frames/${ep}`);
    const d = await r.json();
    if (!d.ok || !d.frames.length) { epInfo.textContent = 'No frame data'; return; }
    vizFrameCount = d.frames.length;
    epInfo.textContent = `${vizFrameCount} frames, ${(vizEpEnd - vizEpStart).toFixed(1)}s`;
    vizDrawChart(d.frames);
  } catch(e) { epInfo.textContent = 'Error: ' + e.message; }
}

// ============================================================
// Playback controls
// ============================================================
function vizTogglePlay() {
  if (vizPlaying) {
    vizStopPlay();
  } else {
    vizPlaying = true;
    const btn = document.getElementById('vizPlayBtn');
    btn.textContent = 'Pause';
    btn.style.background = '#d93025';
    document.querySelectorAll('.viz-video').forEach(v => v.play());
    vizAnimFrame = requestAnimationFrame(vizUpdateLoop);
  }
}

function vizStopPlay() {
  vizPlaying = false;
  const btn = document.getElementById('vizPlayBtn');
  btn.textContent = 'Play';
  btn.style.background = '#34a853';
  document.querySelectorAll('.viz-video').forEach(v => v.pause());
  if (vizAnimFrame) { cancelAnimationFrame(vizAnimFrame); vizAnimFrame = null; }
}

function vizUpdateLoop() {
  if (!vizPlaying) return;
  const videos = document.querySelectorAll('.viz-video');
  if (!videos.length) return;
  const v = videos[0];
  const vStart = parseFloat(v.dataset.epStart) || vizEpStart;
  const vEnd = parseFloat(v.dataset.epEnd) || vizEpEnd;
  const vDuration = vEnd - vStart;
  const elapsed = v.currentTime - vStart;
  const pct = vDuration > 0 ? Math.min(100, Math.max(0, (elapsed / vDuration) * 100)) : 0;

  const mainDuration = vizEpEnd - vizEpStart;
  document.getElementById('vizScrubber').value = pct;
  document.getElementById('vizTimeDisplay').textContent = ((pct / 100) * mainDuration).toFixed(1) + 's';
  vizUpdateChartCursor(pct);
  vizUpdatePhaseLabel(pct);

  if (v.currentTime >= vEnd - 0.05) {
    vizStopPlay();
    return;
  }
  vizAnimFrame = requestAnimationFrame(vizUpdateLoop);
}

// ============================================================
// Scrubber
// ============================================================
function vizScrub(pct) {
  const duration = vizEpEnd - vizEpStart;
  document.querySelectorAll('.viz-video').forEach(v => {
    const vStart = parseFloat(v.dataset.epStart) || vizEpStart;
    const vEnd = parseFloat(v.dataset.epEnd) || vizEpEnd;
    v.currentTime = vStart + (pct / 100) * (vEnd - vStart);
  });
  document.getElementById('vizTimeDisplay').textContent = ((pct / 100) * duration).toFixed(1) + 's';
  vizUpdateChartCursor(pct);
  vizUpdatePhaseLabel(pct);
}

// ============================================================
// Chart cursor
// ============================================================
function vizUpdateChartCursor(pct) {
  const cursor = document.getElementById('vizChartCursor');
  if (!vizChart || !cursor) return;
  const area = vizChart.chartArea;
  if (!area) { cursor.style.display = 'none'; return; }
  const x = area.left + (pct / 100) * (area.right - area.left);
  cursor.style.display = '';
  cursor.style.left = x + 'px';
  cursor.style.top = area.top + 'px';
  cursor.style.height = (area.bottom - area.top) + 'px';
}

// ============================================================
// Phase label
// ============================================================
function vizUpdatePhaseLabel(pct) {
  const lbl = document.getElementById('vizPhaseLabel');
  if (!vizSegments) { lbl.style.display = 'none'; return; }
  const f = Math.round((pct / 100) * (vizFrameCount - 1));
  const seg = vizSegments.find(s => f >= s.start && f <= s.end);
  if (seg) {
    const st = VIZ_PHASE[seg.phase] || VIZ_PHASE.idle;
    lbl.textContent = seg.label;
    lbl.style.background = st.color;
    lbl.style.color = st.text;
    lbl.style.display = '';
  } else {
    lbl.style.display = 'none';
  }
}

// ============================================================
// Auto-detect idle/movement segments
// ============================================================
function vizDetectSegments(frames) {
  const n = frames.length;
  if (n < 5) return [{ start: 0, end: n - 1, phase: 'movement', label: 'movement' }];

  const smooth = (arr, hw) => arr.map((_, i) => {
    let s = 0, c = 0;
    for (let j = Math.max(0, i - hw); j <= Math.min(arr.length - 1, i + hw); j++) { s += arr[j]; c++; }
    return s / c;
  });

  const actionLen = Array.isArray(frames[0].action) ? frames[0].action.length : 6;
  const vel = frames.map((f, i) => {
    if (i === 0) return 0;
    let v = 0;
    for (let j = 0; j < actionLen; j++) v += Math.abs(((f.action || [])[j] || 0) - ((frames[i - 1].action || [])[j] || 0));
    return v;
  });
  const sv = smooth(vel, 5);

  const sorted = [...sv].sort((a, b) => a - b);
  const velThresh = Math.max(sorted[Math.floor(n * 0.85)] * 0.12, 0.3);

  const labels = sv.map(v => v > velThresh ? 'movement' : 'idle');

  const segs = [];
  let segStart = 0;
  for (let i = 1; i <= n; i++) {
    if (i === n || labels[i] !== labels[segStart]) {
      segs.push({ start: segStart, end: i - 1, phase: labels[segStart], label: labels[segStart] });
      segStart = i;
    }
  }

  for (let pass = 0; pass < 3; pass++) {
    for (let i = segs.length - 1; i >= 0; i--) {
      if (segs[i].end - segs[i].start < 4 && segs.length > 1) {
        if (i > 0) {
          segs[i - 1].end = segs[i].end;
        } else {
          segs[1].start = segs[0].start;
        }
        segs.splice(i, 1);
      }
    }
  }

  // Idle only at start/end — convert middle idle to movement
  for (let i = 0; i < segs.length; i++) {
    if (segs[i].phase === 'idle' && i > 0 && i < segs.length - 1) {
      segs[i].phase = 'movement';
      segs[i].label = 'movement';
    }
  }
  // Merge consecutive same-phase segments
  const merged = [segs[0]];
  for (let i = 1; i < segs.length; i++) {
    if (segs[i].phase === merged[merged.length - 1].phase) {
      merged[merged.length - 1].end = segs[i].end;
    } else {
      merged.push(segs[i]);
    }
  }

  return merged;
}

// ============================================================
// Segments: load / save / render
// ============================================================
async function vizLoadSegments(name, ep) {
  try {
    const r = await fetch(`/api/datasets/${name}/segments/${ep}`);
    const d = await r.json();
    if (d.ok && d.segments && d.segments.length) return d.segments;
  } catch(e) {}
  return null;
}

async function vizSaveSegments() {
  if (!vizCurrentDataset || !vizSegments) return;
  const ep = parseInt(document.getElementById('vizEpisodeSelect').value);
  if (isNaN(ep)) return;
  try {
    await fetch(`/api/datasets/${vizCurrentDataset}/segments/${ep}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ segments: vizSegments }),
    });
    document.getElementById('vizSegInfo').textContent = 'Saved';
    setTimeout(() => { const el = document.getElementById('vizSegInfo'); if (el) el.textContent = ''; }, 1500);
  } catch(e) {}
}

function vizRenderSegmentBar() {
  const bar = document.getElementById('vizSegmentBar');
  if (!vizSegments || !vizFrameCount) { bar.innerHTML = ''; return; }
  const N = vizFrameCount;
  let html = '<div style="display:flex;height:22px;border-radius:4px;overflow:hidden;position:relative">';
  vizSegments.forEach((seg, i) => {
    const pct = (seg.end - seg.start + 1) / N * 100;
    const st = VIZ_PHASE[seg.phase] || VIZ_PHASE.idle;
    html += `<div class="seg-block" data-seg="${i}" style="flex:${pct};background:${st.color};display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative" title="${seg.label}: frames ${seg.start}-${seg.end}">
      <span style="font-size:0.68rem;font-weight:600;color:${st.text};white-space:nowrap;padding:0 6px;pointer-events:none">${pct > 5 ? seg.label : ''}</span>
    </div>`;
  });
  html += '</div>';
  for (let i = 1; i < vizSegments.length; i++) {
    const leftPct = (vizSegments[i].start) / N * 100;
    html += `<div class="seg-handle" data-handle="${i}" style="position:absolute;left:calc(${leftPct}% - 5px);top:0;width:10px;height:26px;cursor:col-resize;z-index:10;display:flex;align-items:center;justify-content:center" title="Drag to adjust">
      <div style="width:3px;height:18px;background:#666;border-radius:2px;opacity:0.6"></div>
    </div>`;
  }
  bar.innerHTML = html;

  bar.querySelectorAll('.seg-block').forEach(el => {
    el.addEventListener('click', () => {
      if (vizDragMoved) return;
      vizCycleSegPhase(parseInt(el.dataset.seg));
    });
    el.addEventListener('dblclick', (e) => {
      e.preventDefault();
      const rect = bar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      const frame = Math.round(pct * (N - 1));
      vizSplitAtFrame(frame);
    });
  });

  bar.querySelectorAll('.seg-handle').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      vizDragMoved = false;
      vizDragHandle = { idx: parseInt(el.dataset.handle) };
      document.addEventListener('mousemove', vizHandleDrag);
      document.addEventListener('mouseup', vizHandleDragEnd);
    });
  });
}

function vizHandleDrag(e) {
  if (!vizDragHandle) return;
  vizDragMoved = true;
  const bar = document.getElementById('vizSegmentBar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const frame = Math.round(pct * (vizFrameCount - 1));
  const i = vizDragHandle.idx;
  const prevSeg = vizSegments[i - 1];
  const curSeg = vizSegments[i];
  const minFrame = prevSeg.start + 2;
  const maxFrame = curSeg.end - 1;
  const clampedFrame = Math.max(minFrame, Math.min(maxFrame, frame));
  prevSeg.end = clampedFrame - 1;
  curSeg.start = clampedFrame;
  vizRenderSegmentBar();
  if (vizChart) vizChart.update('none');
}

function vizHandleDragEnd() {
  if (!vizDragHandle) return;
  vizDragHandle = null;
  document.removeEventListener('mousemove', vizHandleDrag);
  document.removeEventListener('mouseup', vizHandleDragEnd);
  if (!vizDragMoved) return;
  for (let j = vizSegments.length - 1; j >= 0; j--) {
    if (vizSegments[j].end - vizSegments[j].start < 2 && vizSegments.length > 1) {
      if (j > 0) {
        vizSegments[j - 1].end = vizSegments[j].end;
      } else {
        vizSegments[j + 1].start = vizSegments[j].start;
      }
      vizSegments.splice(j, 1);
    }
  }
  vizRenderSegmentBar();
  if (vizChart) vizChart.update('none');
  vizSaveSegments();
}

function vizCycleSegPhase(i) {
  if (!vizSegments || i < 0 || i >= vizSegments.length) return;
  const seg = vizSegments[i];
  const curIdx = VIZ_PHASES_CYCLE.indexOf(seg.phase);
  seg.phase = VIZ_PHASES_CYCLE[(curIdx + 1) % VIZ_PHASES_CYCLE.length];
  seg.label = seg.phase;
  vizRenderSegmentBar();
  if (vizChart) vizChart.update('none');
  vizSaveSegments();
}

function vizSplitAtFrame(frame) {
  if (!vizSegments || !vizFrameCount) return;
  const si = vizSegments.findIndex(s => frame >= s.start && frame <= s.end);
  if (si < 0) return;
  const seg = vizSegments[si];
  if (frame - seg.start < 3 || seg.end - frame < 3) return;
  const newSeg = { start: frame, end: seg.end, phase: 'idle', label: 'idle' };
  seg.end = frame - 1;
  vizSegments.splice(si + 1, 0, newSeg);
  vizRenderSegmentBar();
  if (vizChart) vizChart.update('none');
  vizSaveSegments();
}

// ============================================================
// Chart
// ============================================================
async function vizDrawChart(frames) {
  const ctx = document.getElementById('vizChart');
  if (vizChart) vizChart.destroy();

  const ep = parseInt(document.getElementById('vizEpisodeSelect').value);
  try {
    const saved = await vizLoadSegments(vizCurrentDataset, ep);
    if (saved) {
      vizSegments = saved;
    } else {
      vizSegments = vizDetectSegments(frames);
      vizSaveSegments();
    }
    vizRenderSegmentBar();
    vizUpdatePhaseLabel(0);
  } catch(e) { console.error('Segment error:', e); }

  const sampleAction = frames[0] ? frames[0].action : null;
  const jointCount = Array.isArray(sampleAction) ? sampleAction.length : 6;
  const jointNames = jointCount <= VIZ_JOINTS.length ? VIZ_JOINTS.slice(0, jointCount) :
    Array.from({ length: jointCount }, (_, i) => i < VIZ_JOINTS.length ? VIZ_JOINTS[i] : `joint_${i}`);

  const labels = frames.map((f, i) => i);
  const datasets = jointNames.map((j, ji) => ({
    label: j,
    data: frames.map(f => {
      const a = f.action;
      return Array.isArray(a) ? a[ji] : null;
    }),
    borderColor: VIZ_COLORS[ji % VIZ_COLORS.length],
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0.3,
  }));

  vizChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    plugins: [vizSegmentPlugin],
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
      },
      scales: {
        x: { title: { display: true, text: 'Frame' }, ticks: { maxTicksLimit: 20 } },
        y: { title: { display: true, text: 'Value' } },
      },
    },
  });
}

async function vizEditTaskSelected() {
  const checked = [...document.querySelectorAll('.viz-ep-cb:checked')].map(cb => parseInt(cb.dataset.ep));
  if (!checked.length) return;

  const firstEp = vizEpisodesData[checked[0]];
  const currentTask = firstEp && firstEp.tasks ? (Array.isArray(firstEp.tasks) ? firstEp.tasks[0] : firstEp.tasks) : '';

  // Collect tasks actually in use by episodes
  const taskSet = new Set();
  vizEpisodesData.forEach(ep => {
    const ts = ep && ep.tasks ? (Array.isArray(ep.tasks) ? ep.tasks : [ep.tasks]) : [];
    ts.forEach(t => { if (t) taskSet.add(t); });
  });
  const tasks = [...taskSet];

  const optionsHtml = tasks.map(t =>
    `<div class="edit-task-option${t === currentTask ? ' active' : ''}" onclick="selectTaskOption(this)" data-task="${t.replace(/"/g, '&quot;')}">${t}</div>`
  ).join('');

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <h3 style="margin-top:0;margin-bottom:8px">Edit Task</h3>
    <p style="font-size:0.85rem;color:#666;margin-bottom:12px">Set task for ${checked.length} selected episode(s).</p>

function selectTaskOption(el) {
  document.querySelectorAll('.edit-task-option').forEach(e => e.classList.remove('active'));

function clearTaskSelection() {
  document.querySelectorAll('.edit-task-option').forEach(e => e.classList.remove('active'));
  window._selectedTask = null;
}

async function doEditTask() {
  const newInput = document.getElementById('editTaskInput').value.trim();
  const task = newInput || window._selectedTask || '';
  if (!task) { alert('Select an existing task or enter a new one'); return; }
  const episodes = window._editTaskEpisodes;
  const btn = document.getElementById('editTaskSaveBtn');
  const st = document.getElementById('editTaskStatus');
  btn.disabled = true;
  st.textContent = 'Saving...';
  try {
    const r = await fetch(`/api/datasets/${vizCurrentDataset}/update-tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, episodes }),
    });
    const d = await r.json();
    if (d.ok) {
      st.textContent = `Updated ${d.updated_episodes} episode(s)`;
      st.style.color = '#34a853';
      setTimeout(() => {
        closeModal();
        vizToggleSelectMode();
        document.getElementById('vizDatasetSelect').dispatchEvent(new Event('change'));
      }, 800);
    } else {
      st.textContent = d.error || 'Error';
      st.style.color = '#d93025';
      btn.disabled = false;
    }
  } catch(e) { st.textContent = e.message; st.style.color = '#d93025'; btn.disabled = false; }
}

  const checked = [...document.querySelectorAll('.viz-ep-cb:checked')].map(cb => parseInt(cb.dataset.ep));

}

async function importBrowse(path) {
  const browser = document.getElementById('importBrowser');
  const fileList = document.getElementById('importFileList');
  const curPath = document.getElementById('importCurPath');
  browser.style.display = '';
  fileList.innerHTML = '<div style="padding:14px;color:#888;font-size:0.85rem">Loading...</div>';

  try {
    const r = await fetch('/api/browse?path=' + encodeURIComponent(path));
    const d = await r.json();
    if (!d.ok) { fileList.innerHTML = `<div style="padding:14px;color:#d93025;font-size:0.85rem">${d.error}</div>`; return; }

    importBrowsePath = d.current;
    curPath.textContent = d.current;
    document.getElementById('importPathInput').value = d.current;
    document.getElementById('importUpBtn').style.display = d.parent ? '' : 'none';

    if (!d.entries.length) {
      fileList.innerHTML = '<div style="padding:14px;color:#999;font-size:0.85rem">No subdirectories</div>';
      return;
    }

    fileList.innerHTML = '';
    d.entries.forEach(e => {
      const div = document.createElement('div');
      div.style.cssText = 'padding:8px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.85rem';
      if (e.is_dataset) div.style.background = '#e8f5e9';
      else if (e.has_datasets) div.style.background = '#fff8e1';

      let badge = '';
      if (e.is_dataset) badge = '<span style="font-size:0.68rem;background:#2e7d32;color:#fff;padding:1px 6px;border-radius:4px;font-weight:600">Dataset</span>';
      else if (e.has_datasets) badge = '<span style="font-size:0.68rem;background:#f9a825;color:#fff;padding:1px 6px;border-radius:4px;font-weight:600">Contains datasets</span>';

      div.innerHTML = `<span style="color:#1a73e8">&#128193;</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</span>
        ${badge}`;

      div.addEventListener('click', () => {
        if (e.is_dataset || e.has_datasets) {
          document.getElementById('importPathInput').value = e.path;
          fileList.querySelectorAll('div').forEach(d => d.style.outline = '');
          div.style.outline = '2px solid #00897b';
        } else {
          importBrowse(e.path);
        }
      });
      div.addEventListener('dblclick', () => importBrowse(e.path));
      fileList.appendChild(div);
    });
  } catch(e) {
    fileList.innerHTML = `<div style="padding:14px;color:#d93025;font-size:0.85rem">${e.message}</div>`;
  }
}

function importGoUp() {
  const parts = importBrowsePath.split('/');
  parts.pop();
  importBrowse(parts.join('/') || '/');
}

function importStartPoll(btn, st) {
  document.getElementById('importProgress').style.display = '';
  const poll = setInterval(async () => {
    try {
      const r2 = await fetch('/api/import/status');
      const s = await r2.json();
      const bar = document.getElementById('importBar');
      const detail = document.getElementById('importDetail');
      if (bar) bar.style.width = s.progress + '%';
      if (detail) detail.textContent = s.status || '';
      if (st) st.textContent = s.status || '';

      if (s.error) {
        if (st) { st.textContent = s.error; st.style.color = '#d93025'; }
        clearInterval(poll);
        if (btn) btn.disabled = false;
      } else if (!s.running && s.progress >= 100) {
        if (st) st.style.color = '#34a853';
        clearInterval(poll);
        if (btn) btn.disabled = false;
        vizRefreshDatasets();
      }
    } catch(e) {}
  }, 500);
}

function handleDropZone(e) {
  const items = e.dataTransfer.items;
  if (!items || !items.length) return;
  const entries = [];
  for (let i = 0; i < items.length; i++) {
    const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
    if (entry && entry.isDirectory) entries.push(entry);
  }
  if (!entries.length) { alert('Please drop a folder, not files.'); return; }
  // Reuse the global drop handler logic
  _processDropEntries(entries);
}

// ============================================================
// Drag & drop folder import
// ============================================================
(function setupDragDrop() {
  let dragOverlay = null;

  function showOverlay() {
    if (dragOverlay) return;
    dragOverlay = document.createElement('div');
    dragOverlay.id = 'dropOverlay';
    dragOverlay.innerHTML = `
      <div style="border:3px dashed #00897b;border-radius:20px;padding:60px 40px;text-align:center;background:rgba(255,255,255,0.95)">
        <div style="font-size:2.5rem;margin-bottom:10px">&#128194;</div>
        <div style="font-size:1.2rem;font-weight:700;color:#00897b;margin-bottom:6px">Drop dataset folder here</div>
        <div style="font-size:0.85rem;color:#888">Folder will be copied into ./data</div>
      </div>`;
    dragOverlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,137,123,0.08);z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none';
    document.body.appendChild(dragOverlay);
  }

  function hideOverlay() {
    if (dragOverlay) { dragOverlay.remove(); dragOverlay = null; }
  }

  let dragCounter = 0;

  document.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    if (dragCounter === 1) showOverlay();
  });

  document.addEventListener('dragleave', e => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; hideOverlay(); }
  });

  document.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });

  document.addEventListener('drop', async e => {
    e.preventDefault();
    dragCounter = 0;
    hideOverlay();

    const items = e.dataTransfer.items;
    if (!items || !items.length) return;

    const entries = [];
    for (let i = 0; i < items.length; i++) {
      const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
      if (entry && entry.isDirectory) entries.push(entry);
    }

    if (!entries.length) {
      alert('Please drop a folder, not files.');
      return;
    }

    _processDropEntries(entries);
  });

})();

// Shared drop processing
async function _processDropEntries(entries) {
    for (const dirEntry of entries) {
      const folderName = dirEntry.name;
      const allFiles = [];
      await collectFiles(dirEntry, '', allFiles);

      const hasInfo = allFiles.some(f => f.path === 'meta/info.json');
      const subDatasets = new Set();
      allFiles.forEach(f => {
        const m = f.path.match(/^([^/]+)\/meta\/info\.json$/);
        if (m) subDatasets.add(m[1]);
      });

      if (!hasInfo && !subDatasets.size) {
        alert(`"${folderName}" is not a valid LeRobot dataset (no meta/info.json found).`);
        return;
      }

      const formData = new FormData();
      formData.append('folder_name', folderName);
      for (const f of allFiles) {
        formData.append('files', f.file, f.path);
      }

      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid #d0d0d0;border-radius:10px;padding:16px 20px;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:9999;min-width:300px';
      toast.innerHTML = `
        <div style="font-weight:700;font-size:0.9rem;margin-bottom:6px">Importing "${folderName}"...</div>
        <div style="height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden">
          <div id="dropBar" style="height:100%;width:0%;background:#00897b;transition:width 0.3s"></div>
        </div>
        <div id="dropStatus" style="font-size:0.78rem;color:#888;margin-top:4px">Uploading files...</div>`;
      document.body.appendChild(toast);

      try {
        const r = await fetch('/api/datasets/upload', {
          method: 'POST',
          body: formData,
        });
        const d = await r.json();
        const bar = document.getElementById('dropBar');
        const status = document.getElementById('dropStatus');
        if (d.ok) {
          if (bar) bar.style.width = '100%';
          if (status) { status.textContent = `Imported "${d.name}" successfully!`; status.style.color = '#34a853'; }
          vizRefreshDatasets();
        } else {
          if (status) { status.textContent = d.error; status.style.color = '#d93025'; }
        }
      } catch(err) {
        const status = document.getElementById('dropStatus');
        if (status) { status.textContent = err.message; status.style.color = '#d93025'; }
      }

      setTimeout(() => toast.remove(), 4000);
    }
}

function collectFiles(dirEntry, basePath, result) {
  return new Promise(resolve => {
    const reader = dirEntry.createReader();
    const readBatch = () => {
      reader.readEntries(async entries => {
        if (!entries.length) { resolve(); return; }
        for (const entry of entries) {
          const relPath = basePath ? basePath + '/' + entry.name : entry.name;
          if (entry.isFile) {
            const file = await new Promise(res => entry.file(f => res(f)));
            result.push({ path: relPath, file });
          } else if (entry.isDirectory) {
            await collectFiles(entry, relPath, result);
          }
        }
        readBatch();
      });
    };
    readBatch();
  });
}

  const text = clone.textContent.trim();
  const origBtn = el.querySelector('button');
  const onSuccess = () => { if (origBtn) { origBtn.textContent = 'Copied!'; setTimeout(() => { origBtn.textContent = 'Copy'; }, 1500); } };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); onSuccess(); });
  } else {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); onSuccess();
  }
}

    </div>

    <div id="inf-setup" class="tg-panel" style="${activeTab==='inf-setup'?'':'display:none'}">
      <div style="font-size:0.8rem;color:#777;margin-bottom:8px">One-time setup on the GPU server. Skip if already done (same env as Training).</div>
      <div style="font-size:0.78rem;color:#999;margin-bottom:2px">Create Python environment</div>
      ${tCmd('infSetup0a', cmdSetupEnv)}

      ${tCmd('infSetup0b', cmdSetupInstall)}
      <div style="font-size:0.78rem;color:#999;margin-bottom:2px">Install dependencies</div>
      ${tCmd('infSetup0c', cmdSetupDeps)}

    <div id="inf-download" class="tg-panel" style="${activeTab==='inf-download'?'':'display:none'}">
      <div style="font-size:0.8rem;color:#777;margin-bottom:8px">Download the trained model from Hugging Face Hub.</div>
      ${tCmd('infCmd1', cmdDownload)}
    </div>

    <div id="inf-rollout" class="tg-panel" style="${activeTab==='inf-rollout'?'':'display:none'}">
      <div style="font-size:0.8rem;color:#777;margin-bottom:8px">Run inference with <code>lerobot-rollout</code> on the robot. Adjust robot port, camera indices, and task instruction to match your setup.</div>
      ${tCmd('infCmd2', cmdRollout)}
    </div>

    <div id="inf-fakecam" class="tg-panel" style="${activeTab==='inf-fakecam'?'':'display:none'}">
      <div style="font-size:0.8rem;color:#777;margin-bottom:8px">
        Run inference with <strong>fake camera augmentation</strong> using <code>fakecam_inject.py</code>.
        This monkey-patches <code>cv2.VideoCapture</code> to apply real-time augmentation (rotation, brightness, noise, etc.)

      ${tCmd('infCmd3a', cmdFakecamParams)}

function infSwitchTab(btn, panelId) {
  window._infActiveTab = panelId;
  btn.parentElement.querySelectorAll('.tg-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('#modalBody').querySelectorAll('.tg-panel').forEach(p => p.style.display = 'none');
  document.getElementById(panelId).style.display = 'block';
}

function vizRemoveIdle() {
  if (!vizCurrentDataset) return;
  const name = vizCurrentDataset;
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <h3 style="margin-top:0;margin-bottom:8px">Remove Idle Frames</h3>
    <p style="font-size:0.85rem;color:#666;margin-bottom:14px">Remove idle frames from start/end of each episode in <strong>${name}</strong>.</p>
    <div style="margin-bottom:14px">
      <label class="form-label">New Dataset Name</label>
      <input type="text" id="removeIdleName" class="form-input" value="${name}_removeidle">
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn" id="removeIdleBtn" onclick="doRemoveIdle()" style="background:#00897b">Remove Idle</button>
      <button class="btn btn-sm btn-ghost" onclick="closeModal()">Cancel</button>
      <span id="removeIdleStatus" style="font-size:0.85rem;color:#888"></span>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
  document.getElementById('removeIdleName').focus();
  document.getElementById('removeIdleName').select();
}

async function doRemoveIdle() {
  const name = vizCurrentDataset;
  const newName = document.getElementById('removeIdleName').value.trim();
  if (!newName) { alert('Enter a dataset name'); return; }
  const btn = document.getElementById('removeIdleBtn');
  const st = document.getElementById('removeIdleStatus');
  btn.disabled = true;
  st.textContent = 'Processing...';
  st.style.color = '#0097a7';
  try {
    const r = await fetch(`/api/datasets/${name}/remove-idle`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_name: newName }),
    });
    const d = await r.json();
    if (d.ok) {
      st.textContent = `Created "${d.name}": ${d.episodes} eps, removed ${d.removed_frames} idle frames`;
      st.style.color = '#34a853';
      vizRefreshDatasets();
      setTimeout(() => closeModal(), 2000);
    } else {
      st.textContent = d.error; st.style.color = '#d93025';
      btn.disabled = false;
    }
  } catch(e) { st.textContent = e.message; st.style.color = '#d93025'; btn.disabled = false; }
}

async function doRandomSubset(name) {
  const numEps = parseInt(document.getElementById('randNumEps').value);
  const newName = document.getElementById('randNewName').value.trim();
  const st = document.getElementById('randStatus');
  if (!newName) { st.textContent = 'Enter a name'; st.style.color = '#d93025'; return; }

  const btn = document.getElementById('randBtn');
  btn.disabled = true;
  st.textContent = 'Generating...'; st.style.color = '#00695c';
  try {
    const r = await fetch(`/api/datasets/${name}/random-subset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ num_episodes: numEps, new_name: newName }),

    const d = await r.json();
    if (d.ok) {

}
